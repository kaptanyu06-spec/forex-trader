# ธีมมืดโทนน้ำเงินเข้ม (สไตล์ NEXUS ERP ตามที่ผู้ใช้เลือก 2026-07-19)
# สีของกราฟถูกตรวจใหม่สำหรับพื้นหลังมืดแล้ว (dashboard.py หัวไฟล์)
[theme]
base = "dark"
primaryColor = "#3987e5"              # น้ำเงินหลัก (ปุ่ม/จุดเน้น)
backgroundColor = "#0a0f1e"           # พื้นหลังหน้า — น้ำเงินเข้มเกือบดำ
secondaryBackgroundColor = "#121a2b"  # พื้นการ์ด/แถบข้าง — น้ำเงินเข้มอ่อนกว่านิด
textColor = "#e8ecf4"

[browser]
gatherUsageStats = false
